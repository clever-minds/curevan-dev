
name: Curevan CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Grant GITHUB_TOKEN the permissions it needs to write to App Hosting.
permissions:
  contents: read
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Type Check
        run: npm run typecheck
      - name: Run Unit Tests
        run: npm run test
      - name: Run E2E Tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
  
  deploy:
    # This job only runs for pushes to the main branch.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/deploy-apphosting@v0
        with:
          # This is the ID of your project on Google Cloud.
          project_id: ${{ vars.PROJECT_ID }}
          # This is the ID of your App Hosting backend.
          backend_id: ${{ vars.BACKEND_ID }}
          # This is the region of your App Hosting backend.
          location: ${{ vars.LOCATION }}
          # This is the service account that will be used to deploy the app.
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          # This is the ID of the branch that will be deployed.
          branch: main
